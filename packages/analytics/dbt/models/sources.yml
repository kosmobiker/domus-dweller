version: 2

sources:
  - name: bronze
    schema: "{{ var('bronze_dataset', 'bronze') }}"
    tables:
      - name: olx_rent_all
      - name: olx_sale_all

models:
  - name: stg_olx_rent_bronze
    columns:
      - name: source_listing_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
  - name: stg_olx_sale_bronze
    columns:
      - name: source_listing_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
  - name: silver_olx_rent_current
    columns:
      - name: source_listing_id
        tests: [not_null, unique]
  - name: silver_olx_sale_current
    columns:
      - name: source_listing_id
        tests: [not_null, unique]
